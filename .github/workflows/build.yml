name: Java CI
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 19
        uses: actions/setup-java@v4
        with:
          java-version: '19'
          distribution: 'temurin'
      
      - name: Build with Maven (package)
        run: mvn package
      
      - name: Upload JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetaToRelease
          path: target/*.jar  
